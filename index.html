<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harisha & Rahul Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{ box-sizing:border-box; margin:0; padding:0; }

body{
    font-family:'Playfair Display', serif;
    overflow-x:hidden;
    background:#efe3c2;
}

/* ===== PREMIUM LOADER ===== */
#preloader{
    position:fixed;
    width:100%;
    height:100%;
    background:#7a0028;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    transition:opacity 1s ease, visibility 1s ease;
}

.loader-ring{
    width:80px;
    height:80px;
    border:3px solid rgba(232,194,122,0.3);
    border-top:3px solid #e8c27a;
    border-radius:50%;
    animation:spin 1.5s linear infinite;
}

.loading-text{
    margin-top:20px;
    font-family:'Cinzel', serif;
    color:#e8c27a;
    letter-spacing:3px;
    font-size:18px;
    animation:pulse 2s infinite alternate;
}

@keyframes spin{
    to{ transform:rotate(360deg); }
}

@keyframes pulse{
    from{ opacity:0.5; }
    to{ opacity:1; }
}

/* ===== MAIN CONTENT ===== */
#main-content{
    opacity:0;
    transition:opacity 1.5s ease;
    position:relative;
    padding-top:140px;
}

/* ===== BACKGROUND ===== */
.background-layer{
    position:fixed;
    width:100%;
    height:100%;
    background:url('bgimage.png') center/cover no-repeat;
    z-index:-4;
    animation:slowZoom 25s ease-in-out infinite alternate;
}

@keyframes slowZoom{
    from{ transform:scale(1); }
    to{ transform:scale(1.05); }
}

.background-overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(122,0,40,0.85);
    z-index:-3;
}

/* ===== PETALS ===== */
.petal{
    position:fixed;
    top:-50px;
    width:22px;
    pointer-events:none;
    animation:fall linear infinite;
    z-index:0;
}

@keyframes fall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(360deg); opacity:0.7; }
}

/* ===== CARD WRAPPER ===== */
.card-wrapper{
    position:relative;
    width:92%;
    max-width:480px;
    margin:0 auto;
}

/* ===== FLOWERS ===== */
.flower-left,
.flower-right{
    position:absolute;
    top:-100px;
    width:150px;
    z-index:5;
}

.flower-left{ left:-60px; }
.flower-right{ right:-60px; transform:scaleX(-1); }

/* ===== LIGHTS (SMALLER + CORNERS) ===== */
.light{
    position:absolute;
    width:45px;   /* smaller size */
    top:-140px;
    animation:swing 4s ease-in-out infinite;
    z-index:4;
}

.light.left{ left:-20px; }
.light.right{ right:-20px; }

@keyframes swing{
    0%{ transform:rotate(-6deg); }
    50%{ transform:rotate(6deg); }
    100%{ transform:rotate(-6deg); }
}

/* ===== GLASS CARD ===== */
.invite-card{
    background:rgba(122,0,40,0.65);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    color:#e8c27a;
    text-align:center;
    padding:60px 25px;
    border-radius:25px;
    box-shadow:0 25px 70px rgba(0,0,0,0.5);
    animation:cardReveal 1.8s ease forwards;
    position:relative;
    z-index:3;
}

@keyframes cardReveal{
    from{ transform:translateY(40px); opacity:0; }
    to{ transform:translateY(0); opacity:1; }
}

/* ===== TEXT ===== */
.small-text{ font-size:14px; line-height:1.7; }

.names{
    font-family:'Cinzel', serif;
    font-size:34px;
    margin:18px 0;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(232,194,122,0.6);
}

.amp{ font-size:22px; }

.details{ margin-top:15px; font-size:15px; }

.footer-text{
    margin-top:25px;
    font-size:16px;
    color:#fff4d6;
    font-weight:500;
}

/* ===== BUTTON ===== */
.location-btn{
    margin-top:20px;
    padding:10px 24px;
    background:transparent;
    border:2px solid #e8c27a;
    color:#e8c27a;
    font-size:13px;
    border-radius:30px;
    cursor:pointer;
    transition:all 0.4s ease;
}

.location-btn:hover{
    background:#e8c27a;
    color:#7a0028;
    box-shadow:0 0 20px rgba(232,194,122,0.6);
}

/* ===== DESIGNER ===== */
.designer{
    text-align:center;
    margin:30px 0;
    font-size:11px;
    letter-spacing:1px;
    color:#fff4d6;
}

.designer a{
    color:#fff4d6;
    text-decoration:none;
}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){
    .flower-left,.flower-right{ width:120px; top:-85px; }
    .light{ width:35px; top:-120px; }
}

@media(min-width:768px){
    .names{ font-size:60px; }
}

</style>
</head>

<body>

<!-- PRELOADER -->
<div id="preloader">
    <div class="loader-ring"></div>
    <div class="loading-text">Wedding Invitation</div>
</div>

<div id="main-content">

<div class="background-layer"></div>
<div class="background-overlay"></div>

<div class="card-wrapper">

    <!-- Decorations -->
    <img src="flower.png" class="flower-left">
    <img src="flower.png" class="flower-right">

    <img src="light.png" class="light left">
    <img src="light.png" class="light right">

    <!-- Glass Card -->
    <div class="invite-card">

        <div class="small-text">
            Mr Haridas Kurumkandathil <br>
            & Mrs Sheeba Haridas <br><br>
            cordially invite you to the wedding of our daughter
        </div>

        <div class="names">Harisha</div>
        <div class="amp">&</div>
        <div class="names">Rahul</div>

        <div class="small-text">
            son of <br>
            Mr Raju <br>
            & Mrs Geetha Raju
        </div>

        <div class="details">
            Sunday, April 26 <br>
            10:30 am to 11:30 am <br><br>
            at <br>
            Pukayoor, Avanazhi
        </div>

        <button class="location-btn" onclick="openLocation()">
            📍 Get Location
        </button>

        <div class="footer-text">
            All are welcome
        </div>

    </div>

</div>

<div class="designer">
    Designed by 
    <a href="https://instagram.com/ak.sheyyy_" target="_blank">
        Akshay pkr
    </a>
</div>

</div>

<script>

function openLocation(){
    window.open("https://maps.app.goo.gl/CAypXF4dqBvcaAts9?g_st=aw", "_blank");
}

/* Loader fade reveal */
window.addEventListener("load", function(){
    setTimeout(function(){
        document.getElementById("preloader").style.opacity="0";
        document.getElementById("preloader").style.visibility="hidden";
        document.getElementById("main-content").style.opacity="1";
    }, 2000);
});

/* Soft Falling Petals */
for(let i=0;i<12;i++){
    let petal=document.createElement("img");
    petal.src="petals.png";
    petal.className="petal";
    petal.style.left=Math.random()*100+"vw";
    petal.style.animationDuration=(6+Math.random()*6)+"s";
    petal.style.opacity=Math.random();
    document.body.appendChild(petal);
}

</script>

</body>
</html>
