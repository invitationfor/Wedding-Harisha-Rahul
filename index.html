<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harisha & Rahul Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Playfair Display', serif;
    overflow-x:hidden;
    background:#efe3c2;
}

/* ===== PRELOADER ===== */

#preloader{
    position:fixed;
    width:100%;
    height:100%;
    background:#7a0028;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
    transition:opacity 1s ease, visibility 1s ease;
}

.loader-ring{
    width:80px;
    height:80px;
    border:3px solid rgba(232,194,122,0.3);
    border-top:3px solid #e8c27a;
    border-radius:50%;
    animation:spin 1.5s linear infinite;
}

.loading-text{
    margin-top:20px;
    font-family:'Cinzel', serif;
    color:#e8c27a;
    letter-spacing:3px;
    font-size:18px;
    animation:pulse 2s infinite alternate;
}

@keyframes spin{
    to{ transform:rotate(360deg); }
}

@keyframes pulse{
    from{ opacity:0.5; }
    to{ opacity:1; }
}

/* ===== MAIN CONTENT HIDDEN INITIALLY ===== */

#main-content{
    opacity:0;
    transition:opacity 1.5s ease;
}

/* ===== BACKGROUND ===== */

.background-layer{
    position:fixed;
    width:100%;
    height:100%;
    background:url('bgimage.png') center/cover no-repeat;
    z-index:-4;
    animation:slowZoom 25s ease-in-out infinite alternate;
}

@keyframes slowZoom{
    from{ transform:scale(1); }
    to{ transform:scale(1.05); }
}

.background-overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(239,227,194,0.85);
    z-index:-3;
}

/* ===== FLOWERS ===== */

.flower-left,
.flower-right{
    position:fixed;
    top:0;
    width:150px;
    z-index:-2;
}

.flower-left{ left:0; }
.flower-right{ right:0; transform:scaleX(-1); }

/* ===== LIGHTS ===== */

.light{
    position:fixed;
    width:55px;
    top:0;
    animation:swing 4s ease-in-out infinite;
    z-index:-1;
}

.light.left{ left:10%; }
.light.right{ right:10%; }

@keyframes swing{
    0%{ transform:rotate(-6deg); }
    50%{ transform:rotate(6deg); }
    100%{ transform:rotate(-6deg); }
}

/* ===== CARD ===== */

.invite-card{
    width:100%;
    max-width:480px;
    margin:140px auto 0 auto;
    background:#7a0028;
    color:#e8c27a;
    text-align:center;
    padding:65px 25px;
    border-radius:25px;
    box-shadow:0 25px 70px rgba(0,0,0,0.5);
    transform:translateY(40px);
    opacity:0;
    animation:cardReveal 1.8s ease forwards;
}

@keyframes cardReveal{
    to{
        transform:translateY(0);
        opacity:1;
    }
}

/* ===== TEXT ===== */

.small-text{
    font-size:14px;
    line-height:1.7;
}

.names{
    font-family:'Cinzel', serif;
    font-size:34px;
    margin:18px 0;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(232,194,122,0.6);
    animation:goldGlow 3s infinite alternate;
}

@keyframes goldGlow{
    from{ text-shadow:0 0 10px rgba(232,194,122,0.3); }
    to{ text-shadow:0 0 25px rgba(232,194,122,0.9); }
}

.amp{
    font-size:22px;
}

.details{
    margin-top:15px;
    font-size:15px;
}

.footer-text{
    margin-top:25px;
    font-size:15px;
}

/* ===== BUTTON ===== */

.location-btn{
    margin-top:20px;
    padding:10px 24px;
    background:transparent;
    border:2px solid #e8c27a;
    color:#e8c27a;
    font-size:13px;
    border-radius:30px;
    cursor:pointer;
    transition:all 0.4s ease;
}

.location-btn:hover{
    background:#e8c27a;
    color:#7a0028;
    box-shadow:0 0 20px rgba(232,194,122,0.6);
}

/* ===== DESIGNER ===== */

.designer{
    text-align:center;
    margin:25px 0;
    font-size:10px;
    letter-spacing:1px;
    color:#7a0028;
    opacity:0.7;
}

.designer a{
    color:#7a0028;
    text-decoration:none;
}

/* ===== RESPONSIVE ===== */

@media(min-width:768px){
    .names{ font-size:60px; }
    .flower-left,.flower-right{ width:260px; }
    .light{ width:80px; }
}

</style>
</head>

<body>

<!-- PRELOADER -->
<div id="preloader">
    <div class="loader-ring"></div>
    <div class="loading-text">Wedding Invitation</div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content">

<div class="background-layer"></div>
<div class="background-overlay"></div>

<img src="flower.png" class="flower-left">
<img src="flower.png" class="flower-right">

<img src="light.png" class="light left">
<img src="light.png" class="light right">

<div class="invite-card">

    <div class="small-text">
        Mr Haridas Kurumkandathil <br>
        & Mrs Sheeba Haridas <br><br>
        cordially invite you to the wedding of our daughter
    </div>

    <div class="names">Harisha</div>
    <div class="amp">&</div>
    <div class="names">Rahul</div>

    <div class="small-text">
        son of <br>
        Mr Raju <br>
        & Mrs Geetha Raju
    </div>

    <div class="details">
        Sunday, April 26 <br>
        10:30 am to 11:30 am <br><br>
        at <br>
        Pukayoor, Avanazhi
    </div>

    <button class="location-btn" onclick="openLocation()">
        📍 Get Location
    </button>

    <div class="footer-text">
        All are welcome
    </div>

</div>

<div class="designer">
    Designed by 
    <a href="https://instagram.com/ak.sheyyy_" target="_blank">
        Akshay pkr
    </a>
</div>

</div>

<script>

function openLocation(){
    window.open("https://maps.app.goo.gl/CAypXF4dqBvcaAts9?g_st=aw", "_blank");
}

/* PRELOADER CONTROL */

window.addEventListener("load", function(){
    setTimeout(function(){
        document.getElementById("preloader").style.opacity="0";
        document.getElementById("preloader").style.visibility="hidden";
        document.getElementById("main-content").style.opacity="1";
    }, 2000);
});

</script>

</body>
</html>
